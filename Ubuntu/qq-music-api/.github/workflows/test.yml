name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Run linter
        run: npm run eslint
        continue-on-error: true

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Run tests
        if: matrix.node-version != '24.x'
        run: npm test

      - name: Run tests with coverage
        if: matrix.node-version == '24.x'
        run: npm run test:coverage

      - name: Upload unit test coverage to Codecov
        if: matrix.node-version == '24.x'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info,./coverage/coverage-final.json
          flags: unit
          name: codecov-unit-tests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Upload coverage artifact
        if: always() && matrix.node-version == '24.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: |
            coverage/lcov.info
            coverage/coverage-final.json
            coverage/index.html
          if-no-files-found: ignore
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Build TypeScript
        run: npm run build

      - name: Build documentation
        run: npm run docs:build

      - name: Verify build
        run: |
          if [ ! -d "dist" ]; then
            echo "TypeScript build failed: dist directory not found"
            exit 1
          fi

          if [ ! -f "dist/app.js" ]; then
            echo "TypeScript build failed: dist/app.js not found"
            exit 1
          fi

          if [ ! -d "docs-dist" ]; then
            echo "Documentation build failed: docs-dist directory not found"
            exit 1
          fi

          echo "Build successful: dist/ and docs-dist/ verified"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: |
            dist/**
            docs-dist/**
          if-no-files-found: error
          retention-days: 7
