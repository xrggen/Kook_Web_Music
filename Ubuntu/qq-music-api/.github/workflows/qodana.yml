name: Qodana

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'module/**'
      - 'routers/**'
      - 'util/**'
      - 'api/**'
      - 'app.ts'
      - 'koaApp.ts'
      - 'index.ts'
      - 'package.json'
      - 'tsconfig*.json'
      - 'qodana.yml'
      - '.github/workflows/qodana.yml'
  push:
    branches:
      - main
      - 'releases/*'
    paths:
      - 'module/**'
      - 'routers/**'
      - 'util/**'
      - 'api/**'
      - 'app.ts'
      - 'koaApp.ts'
      - 'index.ts'
      - 'package.json'
      - 'tsconfig*.json'
      - 'qodana.yml'
      - '.github/workflows/qodana.yml'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qodana-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.3
        with:
          pr-mode: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
          QODANA_ENDPOINT: 'https://qodana.cloud'

  qodana-main:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.3
        with:
          pr-mode: false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
          QODANA_ENDPOINT: 'https://qodana.cloud'
