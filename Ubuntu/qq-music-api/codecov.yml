codecov:
  require_ci_to_pass: true
  branch: main

coverage:
  precision: 2
  round: down
  range: '70...100'

  status:
    project:
      default:
        # 基础覆盖率要求
        target: 70%
        # 允许覆盖率下降不超过 1%
        threshold: 1%
        # 只在修改的文件上检查
        only_pulls: false
        # 使用 flags
        flags:
          - unit

    patch:
      default:
        # 新代码的覆盖率要求
        target: 80%
        # 允许 5% 的波动
        threshold: 5%
        # 只检查修改的文件
        only_pulls: true
        flags:
          - unit

  # Flags 配置
  flags:
    unit:
      carryforward: false
      paths:
        - tests/unit/

# 忽略某些文件和目录
ignore:
  - 'dist/'
  - 'node_modules/'
  - 'docs/'
  - 'tests/'
  - 'scripts/'
  - '**/*.d.ts'
  - '**/types/**/*.ts'

# 评论配置
comment:
  layout: 'reach,diff,flags,files,footer'
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

# GitHub 检查配置
github_checks:
  annotations: true
